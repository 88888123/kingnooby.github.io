<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingNooby YouTube</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* CAROUSEL CONTAINER */
        .carousel-container {
            position: relative;
            max-width: 900px;
            margin: 40px auto;
            overflow: hidden;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.5s ease;
        }

        .carousel-item {
            min-width: 100%;
            padding: 20px;
        }

        .carousel-item video {
            width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 0 25px #0099ff88;
            outline: none;
        }

        /* FIXED PERFECT CIRCLE ARROWS */
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;

            background: rgba(0, 153, 255, 0.4);
            border: 1px solid #33ccff;
            color: white;
            font-size: 2rem;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow: 0 0 20px #00aaff88;
            user-select: none;
        }

        .carousel-btn:hover {
            background: rgba(51, 204, 255, 0.7);
            box-shadow: 0 0 35px #33ccffaa;
            transform: translateY(-50%) scale(1.1);
        }

        .carousel-btn.left { left: 20px; }
        .carousel-btn.right { right: 20px; }

        /* SUBSCRIBE BUTTON */
        .subscribe-btn {
            margin-top: 10px;
            padding: 14px 28px;
            background: linear-gradient(90deg, #0099ff, #33ccff);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow: 0 0 20px #00aaff88;
        }

        .subscribe-btn:hover {
            background: linear-gradient(90deg, #33ccff, #66d9ff);
            box-shadow: 0 0 35px #33ccffaa;
            transform: translateY(-3px);
        }

        .back-btn {
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="title">KingNooby YouTube</h1>
        <p class="tagline">Latest Videos</p>

        <a href="https://www.youtube.com/@KingNoobyTown" target="_blank">
            <button class="subscribe-btn">Subscribe to KingNooby</button>
        </a>
    </header>

    <!-- VIDEO CAROUSEL -->
    <div class="carousel-container">

        <button class="carousel-btn left">❮</button>

        <div class="carousel-track">

            <!-- VIDEO 1 -->
            <div class="carousel-item">
                <video controls>
                    <source src="videos/video1.mp4" type="video/mp4">
                </video>
            </div>

            <!-- VIDEO 2 -->
            <div class="carousel-item">
                <video controls>
                    <source src="videos/video2.mp4" type="video/mp4">
                </video>
            </div>

            <!-- VIDEO 3 -->
            <div class="carousel-item">
                <video controls>
                    <source src="videos/video3.mp4" type="video/mp4">
                </video>
            </div>

        </div>

        <button class="carousel-btn right">❯</button>

    </div>

    <button class="back-btn" onclick="window.location.href='index.html'">Back to Home</button>

    <script src="script.js"></script>

    <script>
        const track = document.querySelector('.carousel-track');
        const items = Array.from(document.querySelectorAll('.carousel-item'));
        const prevBtn = document.querySelector('.carousel-btn.left');
        const nextBtn = document.querySelector('.carousel-btn.right');

        let index = 0;

        function updateCarousel() {
            track.style.transform = `translateX(-${index * 100}%)`;
        }

        nextBtn.addEventListener('click', () => {
            index = (index + 1) % items.length;
            updateCarousel();
        });

        prevBtn.addEventListener('click', () => {
            index = (index - 1 + items.length) % items.length;
            updateCarousel();
        });
    </script>

</body>
</html>
<footer style="
    margin-top: 60px;
    text-align: center;
    opacity: 0.6;
    color: #66d9ff;
    font-size: 0.75rem;
    text-shadow: 0 0 6px #0099ff;
">
    Website design by Laer
</footer>
