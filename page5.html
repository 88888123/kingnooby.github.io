<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Videos</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .videos-container {
            max-width: 1100px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .video-box {
            background: rgba(15, 15, 25, 0.6);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(0, 170, 255, 0.4);
            box-shadow: 0 0 25px rgba(0, 170, 255, 0.25);
            backdrop-filter: blur(12px);
            transition: 0.3s ease;
            text-align: center;
        }

        .video-box:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 0 45px #00aaffaa;
            border-color: #33ccff;
        }

        iframe {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            border: none;
            box-shadow: 0 0 15px #0099ff88;
        }

        .back-btn {
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="title">YouTube Videos</h1>
        <p class="tagline">Watch the latest from KingNooby</p>
    </header>

    <section class="videos-container">

        <!-- VIDEO 1 -->
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/VIDEO_ID_1" allowfullscreen></iframe>
        </div>

        <!-- VIDEO 2 -->
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/VIDEO_ID_2" allowfullscreen></iframe>
        </div>

        <!-- VIDEO 3 -->
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/VIDEO_ID_3" allowfullscreen></iframe>
        </div>

    </section>

    <button class="back-btn" onclick="window.location.href='index.html'">Back to Home</button>

    <!-- FOOTER -->
    <footer style="
        margin-top: 60px;
        text-align: center;
        opacity: 0.6;
        color: #66d9ff;
        font-size: 0.75rem;
        text-shadow: 0 0 6px #0099ff;
    ">
        Website design by Laer
    </footer>

    <script src="script.js"></script>
</body>
</html>
