<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scripts</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .scripts-container {
            max-width: 900px;
            margin: 40px auto;
            background: rgba(20, 20, 30, 0.55);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(0, 170, 255, 0.4);
            box-shadow: 0 0 25px rgba(0, 170, 255, 0.25);
            backdrop-filter: blur(12px);
            text-align: center;
        }

        .scripts-container a {
            color: #33ccff;
            text-decoration: none;
            font-weight: bold;
            transition: 0.25s ease;
        }

        .scripts-container a:hover {
            color: #66e0ff;
            text-shadow: 0 0 10px #33ccff;
        }

        .back-btn {
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="title">Scripts</h1>
        <p class="tagline">Find all scripts and tools here</p>
    </header>

    <section class="scripts-container">
        <p>
            Find them by clicking 
            <a href="https://dsc.gg/kingnooby" target="_blank">here</a>.
        </p>
    </section>

    <button class="back-btn" onclick="window.location.href='index.html'">Back to Home</button>

    <script src="script.js"></script>
</body>
</html>
<footer style="
    margin-top: 60px;
    text-align: center;
    opacity: 0.6;
    color: #66d9ff;
    font-size: 0.75rem;
    text-shadow: 0 0 6px #0099ff;
">
